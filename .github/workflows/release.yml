name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - "plugin/**"
      - "opencode-plugin/**"
      - "scripts/**"
      - ".github/workflows/release.yml"

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write # required to create the release on a tag push
    steps:
      - uses: actions/checkout@v4

      # The macos-26 image defaults to Xcode 26 (Swift 6.3), which the
      # package's swift-tools-version requires. The toolchain is printed
      # below so a future image default change is visible in the logs.
      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Install swiftformat
        run: brew install swiftformat

      - name: Lint
        run: swiftformat . --lint

      - name: Run full test suite
        run: swift test --quiet

      - name: Build universal release binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Smoke-test built binary
        run: |
          binary=.build/apple/Products/Release/hayes
          lipo -info "$binary"
          "$binary" --version
          "$binary" --help > /dev/null

      - name: Verify hook scripts are executable
        run: |
          test -x ./plugin/hooks/recall.sh
          test -x ./plugin/hooks/assess.sh
          test -x ./plugin/hooks/lib/ensure-hayes.sh

      - name: Validate plugin and marketplace manifests are valid JSON
        run: |
          jq empty plugin/.claude-plugin/plugin.json
          jq empty plugin/hooks/hooks.json
          jq empty .claude-plugin/marketplace.json

      - name: Verify version sync points agree
        run: |
          manifest_version=$(jq -r '.version' plugin/.claude-plugin/plugin.json)
          binary_version=$(.build/apple/Products/Release/hayes --version)
          ts_version=$(sed -nE 's/.*HAYES_VERSION = "([^"]+)".*/\1/p' opencode-plugin/hayes.ts)
          if [[ "$manifest_version" != "$binary_version" || "$manifest_version" != "$ts_version" ]]; then
            echo "::error::version mismatch — manifest=$manifest_version binary=$binary_version opencode=$ts_version"
            echo "Did you forget to run ./scripts/release.sh before tagging?"
            exit 1
          fi

      - name: Publish release with the universal binary
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          cp .build/apple/Products/Release/hayes dist/hayes-macos-universal
          (cd dist && shasum -a 256 hayes-macos-universal > hayes-macos-universal.sha256)
          gh release create "$GITHUB_REF_NAME" \
            dist/hayes-macos-universal \
            dist/hayes-macos-universal.sha256 \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
